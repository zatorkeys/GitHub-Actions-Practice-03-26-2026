name: Python CI/CD Pipeline   # TODO-STEP 1

on:                           # TODO-STEP 2
  push:
  pull_request:

jobs:
  # Build job
  build:                      # TODO-STEP 3
    runs-on: ubuntu-latest    # STEP 3a

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies   # STEP 3b
        run: |                       # STEP 3c
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  # Test job
  test:                       # TODO-STEP 4
    needs: build              # STEP 4a
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies   # STEP 4b
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests              # STEP 4c
        run: pytest